<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroExpert | Perpustakaan Penyakit</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-mint: #dcecd5; --bg-white: #f9fcf7; --text-dark: #2b5329; --text-muted: #5a7a58; --accent-green: #3d7a42; }
        body { font-family: 'Lato', sans-serif; margin: 0; padding: 0; background-color: var(--bg-white); color: var(--text-dark); }
        
        /* HEADER / TOP NAVBAR YANG SUDAH DISAMAKAN */
        .top-navbar { display: flex; justify-content: space-between; align-items: center; height: 70px; background-color: var(--bg-white); padding: 0 40px; box-shadow: 0 2px 15px rgba(43, 83, 41, 0.08); box-sizing: border-box; position: sticky; top: 0; z-index: 100; }
        .logo-area { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--accent-green); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .main-menu { display: flex; gap: 30px; align-items: center; }
        .main-menu a {
            position: relative;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            text-transform: uppercase;
            padding-bottom: 6px;
        }
        
        /* Efek garis bawah (underline) animasi */
        .main-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--accent-green);
            transition: width 0.3s ease;
        }

        /* Warna berubah saat di-hover atau sedang aktif */
        .main-menu a:hover, .main-menu a.active {
            color: var(--accent-green);
        }

        /* Garis bawah memanjang saat di-hover atau sedang aktif */
        .main-menu a:hover::after, .main-menu a.active::after {
            width: 100%;
        }

        .hero-banner { background: linear-gradient(135deg, rgba(43, 83, 41, 0.85) 0%, rgba(61, 122, 66, 0.7) 100%), url('https://images.unsplash.com/photo-1592982537447-6f2334f487cb?q=80&w=2000&auto=format&fit=crop') center/cover; padding: 80px 40px; text-align: center; color: white; }
        .hero-banner h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin: 0 0 15px 0; }
        .hero-banner p { font-size: 18px; opacity: 0.9; max-width: 600px; margin: 0 auto; line-height: 1.6; }

        .library-container { max-width: 1200px; margin: 0 auto; padding: 60px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 35px; }

        .card { background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(43, 83, 41, 0.05); border: 1px solid #e8f0e6; transition: 0.3s ease; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(43, 83, 41, 0.12); }
        .card-img { width: 100%; height: 240px; object-fit: cover; border-bottom: 3px solid var(--accent-green); background: #eee;}
        .card-content { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .card-title { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text-dark); margin: 0 0 15px 0; }
        .section-label { font-size: 13px; font-weight: 700; color: var(--accent-green); text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 0; border-top: 1px dashed #c0d1bc; padding-top: 15px;}
        .section-label:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
        
        .symptoms-list { margin: 0; padding-left: 20px; color: var(--text-dark); font-size: 14px; line-height: 1.5; }
        .symptoms-list li { margin-bottom: 5px; }
        
        .text-detail { font-size: 14px; line-height: 1.6; color: var(--text-dark); margin: 0; }
        .recommendation-text { margin: 0; font-size: 14px; font-weight:bold; color: var(--text-dark); line-height: 1.6; background: var(--bg-mint); padding: 15px; border-radius: 8px; margin-top: auto;}

        @media (max-width: 768px) {
            .top-navbar { flex-direction: column; height: auto; gap: 15px; padding: 20px; position: static; }
            .library-container { grid-template-columns: 1fr; padding: 40px 20px; }
            .hero-banner h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

<header class="top-navbar">
    <a href="index.html" class="logo-area">
        <span style="font-size: 32px;">🌾</span> AgroExpert
    </a>
    <!-- MENU YANG SUDAH DIUPDATE -->
    <nav class="main-menu">
        <a href="index.html">Konsultasi</a>
        <a href="library.html" class="active">Perpustakaan</a>
        <a href="tentang.html">Tentang Aplikasi</a>
        <a href="komplain.html">Komplain</a>
    </nav>
</header>

<div class="hero-banner">
    <h1>Ensiklopedia Pertanian</h1>
    <p>Pelajari berbagai jenis penyakit, hama, penyebab kemunculan, serta dampak fatalnya pada tanaman padi.</p>
</div>

<div class="library-container" id="library-grid"></div>

<script>
    if (!localStorage.getItem('agroDataV4')) {
        alert("Sistem belum diinisialisasi. Silakan buka halaman Konsultasi terlebih dahulu.");
        window.location.href = "index.html";
    }
    const knowledgeBase = JSON.parse(localStorage.getItem('agroDataV4'));

    function getFlatGejala() {
        let flat = {}; for (let k in knowledgeBase.kategoriGejala) Object.assign(flat, knowledgeBase.kategoriGejala[k]); return flat;
    }
    const deskripsiGejala = getFlatGejala();

    function renderLibrary() {
        const container = document.getElementById("library-grid");
        container.innerHTML = "";

        for (const [kodePenyakit, data] of Object.entries(knowledgeBase.penyakit)) {
            let listGejalaHTML = "";
            data.gejalaTerkait.forEach(kodeG => {
                let deskripsi = deskripsiGejala[kodeG] || "Deskripsi gejala tidak ditemukan";
                listGejalaHTML += `<li>${deskripsi}</li>`;
            });

            let imgUrl = data.gambar || "images/default.jpg";

            const cardHTML = `
                <div class="card">
                    <img src="${imgUrl}" onerror="this.src='https://images.pexels.com/photos/1684149/pexels-photo-1684149.jpeg?auto=compress&cs=tinysrgb&w=600'" alt="${data.nama}" class="card-img">
                    <div class="card-content">
                        <h3 class="card-title">${data.nama}</h3>
                        
                        <div class="section-label">Gejala Tumbuhan:</div>
                        <ul class="symptoms-list">${listGejalaHTML}</ul>

                        <div class="section-label">Sebab Kemunculan:</div>
                        <p class="text-detail">${data.sebab || 'Informasi belum tersedia.'}</p>

                        <div class="section-label">Akibat pada Kualitas Beras:</div>
                        <p class="text-detail">${data.akibat || 'Informasi belum tersedia.'}</p>

                        <div class="section-label" style="margin-top: 25px;">Solusi Penanganan:</div>
                        <p class="recommendation-text">${data.rekomendasi}</p>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        }
    }

    window.onload = renderLibrary;
</script>
</body>
</html>
