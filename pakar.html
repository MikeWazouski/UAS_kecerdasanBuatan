<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroExpert - Pakar</title>
    <style>
        :root {
            --apple-blue: #007aff; --apple-blue-hover: #005bb5;
            --apple-bg: #f5f5f7; --apple-card: rgba(255, 255, 255, 0.75);
            --apple-text: #1d1d1f; --apple-text-muted: #86868b;
            --apple-border: rgba(0, 0, 0, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?q=80&w=2029&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; margin: 0; display: flex;
            justify-content: center; align-items: center; padding: 20px; color: #1d1d1f;
        }
        .app-container {
            width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 24px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .nav-links { margin-bottom: 20px; }
        .nav-links a { text-decoration: none; color: #007aff; font-weight: 500; font-size: 15px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #1d1d1f; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px;
            box-sizing: border-box; font-family: inherit; font-size: 15px; background: rgba(255,255,255,0.9);
            transition: 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.2); }
        .btn-simpan {
            width: 100%; padding: 16px; background: #007aff; color: white; border: none;
            border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-simpan:hover { background: #005bb5; }
        .info-gejala { font-size: 13px; color: #86868b; margin-top: 10px; line-height: 1.5; background: rgba(0,0,0,0.03); padding: 12px; border-radius: 12px; max-height: 150px; overflow-y: auto;}
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav-links"><a href="index.html">← Kembali</a></div>
    <div class="header">
        <h1>Akuisisi Pengetahuan</h1>
        <p style="color: #86868b; font-size: 15px; margin-top: 5px;">Tambah Aturan Diagnosis</p>
    </div>

    <div class="form-group">
        <label>Kode Penyakit Baru (Misal: P11)</label>
        <input type="text" id="input-kode" placeholder="Kode unik...">
    </div>
    <div class="form-group">
        <label>Nama Penyakit</label>
        <input type="text" id="input-nama" placeholder="Masukkan nama...">
    </div>
    <div class="form-group">
        <label>Gejala Terkait (Pisahkan koma: G01, G03)</label>
        <input type="text" id="input-gejala" placeholder="Contoh: G01, G05">
        <div class="info-gejala" id="list-gejala-pakar"></div>
    </div>
    <div class="form-group">
        <label>Rekomendasi Penanganan</label>
        <textarea id="input-rekomendasi" rows="3" placeholder="Saran tindakan..."></textarea>
    </div>
    
    <button class="btn-simpan" onclick="tambahPenyakitBaru()">Simpan Data</button>
</div>

<script>
    if (!localStorage.getItem('agroDataV3')) window.location.href = "index.html";
    const knowledgeBase = JSON.parse(localStorage.getItem('agroDataV3'));

    let infoText = "";
    for (let k in knowledgeBase.kategoriGejala) {
        infoText += `<strong style="color:#1d1d1f; display:block; margin-top:6px;">${k}</strong>`;
        for (let [kode, deskripsi] of Object.entries(knowledgeBase.kategoriGejala[k])) {
            infoText += `${kode} - ${deskripsi}<br>`;
        }
    }
    document.getElementById("list-gejala-pakar").innerHTML = infoText;

    function getFlatGejalaKeys() {
        let keys = [];
        for (let k in knowledgeBase.kategoriGejala) keys.push(...Object.keys(knowledgeBase.kategoriGejala[k]));
        return keys;
    }

    function tambahPenyakitBaru() {
        const kode = document.getElementById("input-kode").value.trim().toUpperCase();
        const nama = document.getElementById("input-nama").value.trim();
        const gejalaRaw = document.getElementById("input-gejala").value.toUpperCase();
        const rekomendasi = document.getElementById("input-rekomendasi").value.trim();

        if (!kode || !nama || !gejalaRaw || !rekomendasi) return alert("Lengkapi semua bidang!");

        const flatKeys = getFlatGejalaKeys();
        const gejalaArray = gejalaRaw.split(",").map(g => g.trim()).filter(g => flatKeys.includes(g));
        if (gejalaArray.length === 0) return alert("Kode gejala tidak valid.");

        knowledgeBase.penyakit[kode] = { nama, gejalaTerkait: gejalaArray, rekomendasi };
        localStorage.setItem('agroDataV3', JSON.stringify(knowledgeBase));
        
        alert(`Disimpan!`);
        window.location.href = "index.html"; 
    }
</script>
</body>
</html>
