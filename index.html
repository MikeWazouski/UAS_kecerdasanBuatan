<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroExpert | Natural & Healthy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mint: #dcecd5;
            --bg-white: #f9fcf7;
            --text-dark: #2b5329;
            --text-muted: #5a7a58;
            --accent-green: #3d7a42;
        }
        
        body {
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-white);
            color: var(--text-dark);
            overflow: hidden; /* Mencegah scroll body */
        }

        /* Layout Dua Kolom Memenuhi Layar */
        .split-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* KOLOM KIRI (Visual & Judul) */
        .left-panel {
            flex: 0 0 45%;
            position: relative;
            background: url('https://images.unsplash.com/photo-1586201375761-83865001e31c?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            color: white;
            box-sizing: border-box;
        }
        
        /* Overlay hijau gelap agar teks putih terbaca jelas */
        .left-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(43, 83, 41, 0.85) 0%, rgba(61, 122, 66, 0.6) 100%);
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .header-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            margin: 0 0 20px 0;
            line-height: 1.1;
        }

        .header-content p {
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 40px 0;
            opacity: 0.9;
            max-width: 400px;
        }

        /* KOLOM KANAN (Aplikasi) */
        .right-panel {
            flex: 1;
            background-color: var(--bg-white);
            padding: 60px 80px;
            overflow-y: auto; /* Bisa discroll sendiri */
            box-sizing: border-box;
            position: relative;
        }

        .nav-links {
            position: absolute;
            top: 30px;
            right: 40px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--accent-green);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            padding: 10px 20px;
            background: var(--bg-mint);
            border-radius: 30px;
            transition: 0.3s;
        }
        .nav-links a:hover { background: var(--accent-green); color: white; }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 30px;
            color: var(--text-dark);
            margin-top: 20px;
        }

        .kategori-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--text-dark);
            margin: 25px 0 15px 0;
            border-bottom: 2px solid var(--bg-mint);
            padding-bottom: 10px;
        }

        .gejala-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .gejala-item {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            background: #ffffff;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s ease;
            border: 1px solid #e8f0e6;
        }
        .gejala-item:hover {
            background: var(--bg-mint);
            transform: translateX(5px);
        }
        
        .gejala-item input {
            accent-color: var(--accent-green);
            width: 18px;
            height: 18px;
            margin-right: 15px;
            margin-top: 2px;
            cursor: pointer;
        }
        
        .gejala-teks { font-size: 15px; line-height: 1.5; }
        .kode-gejala { font-weight: 700; color: var(--accent-green); margin-right: 5px; }

        .btn-diagnosa {
            width: 100%;
            margin-top: 40px;
            padding: 18px;
            background-color: var(--accent-green);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-diagnosa:hover { background-color: var(--text-dark); box-shadow: 0 10px 20px rgba(43, 83, 41, 0.2); }

        .result-box {
            margin-top: 40px;
            padding: 30px;
            background-color: var(--bg-mint);
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.6s ease-out;
            margin-bottom: 50px;
        }
        .result-box h3 { font-family: 'Playfair Display', serif; font-size: 26px; margin: 0 0 15px 0; }
        .result-box p { font-size: 15px; line-height: 1.6; margin: 0; }
        .explanation { margin-top: 20px; padding-top: 20px; border-top: 1px solid #c0d1bc; font-size: 14px; color: var(--text-muted); }
        .explanation ul { padding-left: 20px; margin-top: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .split-layout { flex-direction: column; height: auto; overflow: visible; }
            body { overflow: visible; }
            .left-panel { flex: none; height: 350px; padding: 40px; }
            .header-content h1 { font-size: 42px; }
            .right-panel { padding: 30px; height: auto; overflow: visible; }
            .nav-links { position: relative; top: 0; right: 0; margin-bottom: 20px; text-align: right;}
        }
    </style>
</head>
<body>

<div class="split-layout">
    <!-- Kolom Kiri -->
    <div class="left-panel">
        <div class="header-content">
            <h1>AgroExpert<br>System</h1>
            <p>Membantu petani mengidentifikasi hama dan penyakit tanaman padi dengan akurat demi hasil panen yang lebih sehat dan berlimpah secara alami.</p>
        </div>
    </div>

    <!-- Kolom Kanan -->
    <div class="right-panel">
        <div class="nav-links"><a href="login.html">Login Pakar ➔</a></div>
        
        <h2 class="form-title">Konsultasi Gejala</h2>
        <div id="gejala-container">
            <!-- Dirender oleh JS -->
        </div>

        <button class="btn-diagnosa" onclick="diagnosa()">Mulai Analisis</button>

        <div id="hasil-diagnosis" class="result-box">
            <h3 id="nama-penyakit"></h3>
            <p id="rekomendasi-penyakit"></p>
            <div class="explanation" id="penjelasan-logika"></div>
        </div>
    </div>
</div>

<script>
    // Data V3 (Tidak Berubah)
    const defaultData = {
        kategoriGejala: {
            "Gejala pada Daun": {
                "G01": "Daun menguning mulai dari ujung hingga ke pangkal",
                "G02": "Terdapat bercak coklat berbentuk belah ketupat",
                "G03": "Daun menggulung, melintir, atau mengering",
                "G04": "Terdapat garis kuning/putih sejajar tulang daun",
                "G12": "Terdapat bercak oval/bulat coklat dengan tepi kekuningan",
                "G13": "Daun menggulung menyerupai daun bawang (puru)"
            },
            "Gejala pada Batang": {
                "G05": "Tanaman tumbuh kerdil secara tidak normal",
                "G06": "Batang bawah membusuk, lunak, atau berbau",
                "G07": "Terdapat jelaga hitam di area pangkal batang",
                "G08": "Batang mudah tercabut dan titik tumbuh mati",
                "G14": "Batang terpotong miring seperti bekas gigitan",
                "G15": "Bibit/tanaman muda terpotong di area tergenang"
            },
            "Gejala Lingkungan & Bulir": {
                "G09": "Malai padi hampa, berwarna putih, dan tegak lurus",
                "G10": "Bulir padi kehitaman atau terdapat bercak coklat",
                "G11": "Akar membusuk dan berwarna kecoklatan/hitam",
                "G16": "Tercium bau menyengat (seperti kepik)",
                "G17": "Terdapat kumpulan telur merah muda cerah",
                "G18": "Kerusakan memusat di tengah petak sawah"
            }
        },
        penyakit: {
            "P01": { nama: "Penyakit Blas", gejalaTerkait: ["G01", "G02", "G06"], rekomendasi: "Gunakan fungisida trisiklazol dan rotasi tanaman." },
            "P02": { nama: "Wereng Coklat", gejalaTerkait: ["G01", "G05", "G07"], rekomendasi: "Gunakan insektisida pimetrozin, keringkan lahan berselang." },
            "P03": { nama: "Penyakit Tungro", gejalaTerkait: ["G01", "G05", "G03"], rekomendasi: "Cabut tanaman terinfeksi, kendalikan wereng hijau." },
            "P04": { nama: "Penggerek Batang", gejalaTerkait: ["G08", "G09"], rekomendasi: "Gunakan karbofuran pada pesemaian, atur waktu tanam." },
            "P05": { nama: "Hawar Daun Bakteri", gejalaTerkait: ["G01", "G04"], rekomendasi: "Gunakan bakterisida, kurangi pupuk Nitrogen." },
            "P06": { nama: "Hama Tikus", gejalaTerkait: ["G14", "G18"], rekomendasi: "Lakukan gropyokan, gunakan umpan beracun/pengemposan." },
            "P07": { nama: "Hama Keong Mas", gejalaTerkait: ["G15", "G17"], rekomendasi: "Pungut telur manual, buat parit, pasang saringan air." },
            "P08": { nama: "Walang Sangit", gejalaTerkait: ["G09", "G10", "G16"], rekomendasi: "Kendalikan gulma, pasang umpan bangkai, semprot fipronil." },
            "P09": { nama: "Bercak Daun Coklat", gejalaTerkait: ["G11", "G12"], rekomendasi: "Perbaiki kesuburan tanah (Kalium), gunakan mankozeb." },
            "P10": { nama: "Hama Ganjur", gejalaTerkait: ["G05", "G13"], rekomendasi: "Hindari penanaman lambat, kurangi genangan air." }
        }
    };

    if (!localStorage.getItem('agroDataV3')) {
        localStorage.setItem('agroDataV3', JSON.stringify(defaultData));
    }
    const knowledgeBase = JSON.parse(localStorage.getItem('agroDataV3'));

    function getFlatGejala() {
        let flat = {};
        for (let k in knowledgeBase.kategoriGejala) Object.assign(flat, knowledgeBase.kategoriGejala[k]);
        return flat;
    }

    function renderGejala() {
        const container = document.getElementById("gejala-container");
        container.innerHTML = "";
        
        for (const [kategori, gejalaObj] of Object.entries(knowledgeBase.kategoriGejala)) {
            const title = document.createElement("div");
            title.className = "kategori-title";
            title.innerText = kategori;
            container.appendChild(title);

            const grid = document.createElement("div");
            grid.className = "gejala-grid";

            for (const [kode, deskripsi] of Object.entries(gejalaObj)) {
                const label = document.createElement("label");
                label.className = "gejala-item";
                label.innerHTML = `
                    <input type="checkbox" value="${kode}"> 
                    <span class="gejala-teks"><span class="kode-gejala">${kode}</span> ${deskripsi}</span>
                `;
                grid.appendChild(label);
            }
            container.appendChild(grid);
        }
    }

    function diagnosa() {
        const checkboxes = document.querySelectorAll('.gejala-item input[type="checkbox"]:checked');
        const gejalaPilihan = Array.from(checkboxes).map(cb => cb.value);
        const resultBox = document.getElementById("hasil-diagnosis");
        const flatGejala = getFlatGejala();

        if (gejalaPilihan.length === 0) {
            alert("Mohon pilih minimal satu gejala terlebih dahulu.");
            return;
        }

        let kandidatTerbaik = null; let skorTertinggi = 0; let gejalaCocokTerbaik = [];

        for (const [kodeP, dataP] of Object.entries(knowledgeBase.penyakit)) {
            const irisanGejala = dataP.gejalaTerkait.filter(g => gejalaPilihan.includes(g));
            const skor = (irisanGejala.length / dataP.gejalaTerkait.length) * 100;
            if (skor > skorTertinggi) {
                skorTertinggi = skor; kandidatTerbaik = dataP; gejalaCocokTerbaik = irisanGejala;
            }
        }

        resultBox.style.display = "block";
        if (kandidatTerbaik && skorTertinggi >= 50) {
            document.getElementById("nama-penyakit").innerHTML = `${kandidatTerbaik.nama} <span style="font-size:14px; font-weight:normal; color:var(--text-muted); float:right; font-family:'Lato', sans-serif; margin-top:8px;">Akurasi: ${skorTertinggi.toFixed(0)}%</span>`;
            document.getElementById("rekomendasi-penyakit").innerHTML = `<strong>Rekomendasi Alami/Medis:</strong><br>${kandidatTerbaik.rekomendasi}`;
            
            let penjelasanHtml = `<strong>Analisis Sistem Pakar:</strong><br>Membutuhkan ${kandidatTerbaik.gejalaTerkait.length} indikator utama:<ul>`;
            kandidatTerbaik.gejalaTerkait.forEach(kodeG => {
                const ter = gejalaCocokTerbaik.includes(kodeG);
                penjelasanHtml += `<li><span style="color:${ter?'#3d7a42':'#d9534f'}; font-weight:bold;">${ter?'✓ Terpenuhi':'✕ Tidak Terpenuhi'}</span> - ${flatGejala[kodeG]}</li>`;
            });
            document.getElementById("penjelasan-logika").innerHTML = penjelasanHtml + "</ul>";
        } else {
            document.getElementById("nama-penyakit").innerText = "Kondisi Tidak Spesifik";
            document.getElementById("rekomendasi-penyakit").innerText = "Gejala yang dimasukkan terlalu acak. Disarankan berkonsultasi langsung dengan penyuluh pertanian.";
            document.getElementById("penjelasan-logika").innerHTML = "";
        }
    }
    window.onload = renderGejala;
</script>
</body>
</html>
