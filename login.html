<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroExpert | Login Pakar</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mint: #dcecd5; --bg-white: #f9fcf7; --text-dark: #2b5329;
            --text-muted: #5a7a58; --accent-green: #3d7a42;
        }
        body {
            font-family: 'Lato', sans-serif; margin: 0; padding: 0;
            background-color: var(--bg-white); color: var(--text-dark); overflow: hidden;
        }
        .split-layout { display: flex; height: 100vh; width: 100vw; }
        .left-panel {
            flex: 0 0 45%; position: relative;
            background: url('https://images.unsplash.com/photo-1596162954151-cdcb4c0f70a8?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; justify-content: center;
            padding: 60px; color: white; box-sizing: border-box;
        }
        .left-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(43, 83, 41, 0.85) 0%, rgba(61, 122, 66, 0.6) 100%); z-index: 1;
        }
        .header-content { position: relative; z-index: 2; }
        .header-content h1 { font-family: 'Playfair Display', serif; font-size: 64px; margin: 0 0 20px 0; line-height: 1.1; }
        .header-content p { font-size: 18px; line-height: 1.6; margin: 0; opacity: 0.9; max-width: 400px; }
        .right-panel {
            flex: 1; background-color: var(--bg-white); padding: 60px 80px;
            display: flex; flex-direction: column; justify-content: center;
            overflow-y: auto; box-sizing: border-box; position: relative;
        }
        .nav-links { position: absolute; top: 30px; right: 40px; }
        .nav-links a {
            text-decoration: none; color: var(--text-muted); font-weight: 700;
            font-size: 14px; letter-spacing: 1px; padding: 10px 20px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent-green); }
        .form-title { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 10px; }
        .form-subtitle { color: var(--text-muted); margin-bottom: 40px; font-size: 15px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 15px; border: 1px solid #c0d1bc; border-radius: 8px;
            font-family: inherit; font-size: 15px; background: #ffffff; box-sizing: border-box; transition: 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--accent-green); box-shadow: 0 0 0 3px rgba(61, 122, 66, 0.15); }
        .btn-login {
            width: 100%; padding: 18px; background-color: var(--accent-green); color: white; border: none;
            border-radius: 10px; font-size: 16px; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px;
        }
        .btn-login:hover { background-color: var(--text-dark); box-shadow: 0 10px 20px rgba(43, 83, 41, 0.2); }
        
        @media (max-width: 900px) {
            .split-layout { flex-direction: column; height: auto; overflow: visible; }
            body { overflow: visible; }
            .left-panel { flex: none; height: 300px; padding: 40px; }
            .header-content h1 { font-size: 42px; }
            .right-panel { padding: 40px 30px; height: auto; overflow: visible; }
            .nav-links { position: relative; top: 0; right: 0; margin-bottom: 20px; text-align: right;}
        }
    </style>
</head>
<body>

<div class="split-layout">
    <div class="left-panel">
        <div class="header-content">
            <h1>Otorisasi<br>Sistem</h1>
            <p>Halaman ini dibatasi hanya untuk Pakar Pertanian dan Administrator Sistem.</p>
        </div>
    </div>

    <div class="right-panel">
        <div class="nav-links"><a href="index.html">← Batal & Kembali</a></div>
        
        <h2 class="form-title">Selamat Datang, Pakar.</h2>
        <p class="form-subtitle">Silakan masukkan kredensial Anda untuk mengakses modul akuisisi pengetahuan.</p>

        <form id="loginForm" onsubmit="prosesLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-login">Masuk ke Sistem</button>
        </form>
    </div>
</div>

<script>
    function prosesLogin(event) {
        event.preventDefault(); // Mencegah halaman refresh saat tombol ditekan
        
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // HARDBOUND CREDENTIALS (Sandi & Username Statis)
        if (user === "pakar" && pass === "admin123") {
            // Simpan tiket sesi login di browser
            sessionStorage.setItem("isLoggedIn", "true");
            window.location.href = "pakar.html"; // Arahkan ke halaman pakar
        } else {
            alert("Akses Ditolak! Username atau Password salah.");
            document.getElementById("password").value = ""; // Kosongkan kolom password
        }
    }
</script>
</body>
</html>
